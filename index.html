<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BioMotion Baseball Lab (BBL) · 국민대 야구 바이오메카닉스 랩</title>
<meta name="description" content="BioMotion Baseball Lab (BBL). 국민대 30년 바이오메카닉스 연구 기반, 선수를 위한 3D 모션캡쳐 분석 센터. 감(感)의 시대는 끝났다.">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
<link rel="icon" type="image/png" href="assets/bbl-mark-light.png">
<link rel="stylesheet" href="styles.css?v=11">
<link rel="stylesheet" href="styles-kseq-split.css?v=4">
</head>
<body>
<div id="root"></div>

<script>
// --- Tweaks panel state (persisted to file via __edit_mode_set_keys) ---
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "primaryColor": "#2563EB",
  "heroVariant": "editorial",
  "heroHeadline": "measure",
  "locale": "ko"
}/*EDITMODE-END*/;
window.TWEAKS = Object.assign({}, TWEAK_DEFAULTS);

function applyTweaks() {
  const t = window.TWEAKS;
  document.documentElement.dataset.theme = t.theme;
  document.documentElement.style.setProperty('--primary', t.primaryColor);
  // Derive soft variant
  const softMap = {
    '#2563EB': '#60a5fa',
    '#DC2626': '#f87171',
    '#059669': '#34d399',
    '#7c3aed': '#a78bfa',
    '#f97316': '#fb923c',
  };
  document.documentElement.style.setProperty('--primary-soft', softMap[t.primaryColor] || t.primaryColor);
}
applyTweaks();
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="components/i18n.js?v=5"></script>
<script type="text/babel" src="components/Nav.jsx?v=3"></script>
<script type="text/babel" src="components/Hero.jsx?v=2"></script>
<script type="text/babel" src="components/WhyBBL.jsx?v=2"></script>
<script type="text/babel" src="components/System.jsx?v=14"></script>
<script type="text/babel" src="components/Services.jsx?v=3"></script>
<script type="text/babel" src="components/Report.jsx"></script>
<script type="text/babel" src="components/ResearchNotes.jsx?v=2"></script>
<script type="text/babel" src="components/Testimonials.jsx?v=2"></script>
<script type="text/babel" src="components/Booking.jsx"></script>
<script type="text/babel" src="components/FaqContact.jsx?v=3"></script>

<script type="text/babel">

function Ticker({ items }) {
  const doubled = [...items, ...items];
  return (
    <div className="hp-ticker">
      <div className="hp-ticker-track">
        {doubled.map((it, i) => (
          <React.Fragment key={i}>
            <span className={it.em ? 'em' : ''}>{it.text}</span>
            <span className="star">✦</span>
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

function TweaksPanel() {
  const [open, setOpen] = React.useState(false);
  const [tick, setTick] = React.useState(0);
  const rerender = () => setTick(t => t+1);

  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data;
      if (!d) return;
      if (d.type === '__activate_edit_mode') setOpen(true);
      if (d.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type: '__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const set = (k, v) => {
    window.TWEAKS[k] = v;
    applyTweaks();
    window.parent.postMessage({type: '__edit_mode_set_keys', edits: {[k]: v}}, '*');
    window.dispatchEvent(new CustomEvent('tweaks-changed', {detail:{k, v}}));
    rerender();
  };

  const t = window.TWEAKS;
  const colors = [
    ['#2563EB', 'Royal'],
    ['#DC2626', 'Red'],
    ['#059669', 'Green'],
    ['#7c3aed', 'Purple'],
    ['#f97316', 'Amber'],
  ];

  return (
    <div className={`tweaks-panel ${open ? 'on' : ''}`}>
      <div className="tweaks-head">
        <h4>TWEAKS</h4>
        <button onClick={()=>setOpen(false)} style={{background:'transparent',border:'none',color:'var(--ink-3)',fontSize:18,cursor:'pointer'}}>×</button>
      </div>
      <div className="tweaks-body">
        <div className="tweaks-row">
          <label>Theme</label>
          <div className="tweaks-chips">
            {['dark','light'].map(v => (
              <button key={v} className={`tweaks-chip ${t.theme===v?'on':''}`} onClick={()=>set('theme', v)}>
                {v === 'dark' ? '🌙 Dark' : '☀️ Light'}
              </button>
            ))}
          </div>
        </div>
        <div className="tweaks-row">
          <label>Accent Color</label>
          <div className="tweaks-swatches">
            {colors.map(([c, n]) => (
              <button
                key={c}
                className={`tweaks-swatch ${t.primaryColor===c?'on':''}`}
                onClick={()=>set('primaryColor', c)}
                style={{background: c}}
                title={n}
              />
            ))}
          </div>
        </div>
        <div className="tweaks-row">
          <label>Hero Variant</label>
          <div className="tweaks-chips">
            {['editorial','split','centered'].map(v => (
              <button key={v} className={`tweaks-chip ${t.heroVariant===v?'on':''}`} onClick={()=>set('heroVariant', v)}>
                {v}
              </button>
            ))}
          </div>
        </div>
        <div className="tweaks-row">
          <label>Hero Headline</label>
          <div className="tweaks-chips tweaks-chips-col">
            {[
              ['feel',    '감(感)의 시대는 끝났다.'],
              ['data',    '데이터는 거짓말을 하지 않는다.'],
              ['measure', '측정되지 않으면 개선되지 않는다.'],
              ['key',     '보이지 않던 실력의 열쇠를 찾아낸다.'],
              ['body',    '몸의 언어를 숫자로 읽는다.'],
              ['science', '과학이 이기는 야구를 만든다.'],
            ].map(([k, label]) => (
              <button key={k} className={`tweaks-chip tweaks-chip-wide ${t.heroHeadline===k?'on':''}`} onClick={()=>set('heroHeadline', k)}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  React.useEffect(() => {
    const onScroll = () => {
      const bar = document.getElementById('hp-progress');
      if (!bar) return;
      const h = document.documentElement;
      const p = (h.scrollTop) / (h.scrollHeight - h.clientHeight);
      bar.style.width = `${Math.max(0, Math.min(1, p)) * 100}%`;
    };
    window.addEventListener('scroll', onScroll, {passive:true});
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const tickerA = [
    { text: 'KOOKMIN · BIOMECHANICS LAB', em: true },
    { text: '3D MOTION CAPTURE · 240Hz' },
    { text: 'FORCE PLATES · 1000Hz' },
    { text: 'KINEMATIC SEQUENCE · PROXIMAL → DISTAL', em: true },
    { text: 'QUALISYS · THEIA3D · VALD · RAPSODO · UPLIFT' },
    { text: '감(感)의 시대는 끝났다', em: true },
    { text: 'SEOUL · KR · 37.6104° N · 127.0029° E' },
  ];

  return (
    <>
      <Nav />
      <main>
        <Hero />
        <Ticker items={tickerA} />
        <WhyBBL />
        <System />
        <Services />
        <Report />
        <ResearchNotes />
        <Testimonials />
        <Booking />
        <FAQ />
        <Contact />
      </main>
      <Footer />
      <TweaksPanel />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
