<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지를 찾을 수 없습니다 (404) | BBL</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/assets/logo-biomotion.png">

  <style>
    :root {
      --primary: #2563eb;
      --primary-light: #3b82f6;
      --text-primary: #f5f7fb;
      --text-secondary: #9ca4b7;
      --text-tertiary: #6b7280;
      --bg: #08080c;
      --card-bg: rgba(18, 20, 26, 0.6);
      --card-border: rgba(255, 255, 255, 0.08);
      --gradient-text: linear-gradient(135deg, #2563eb 0%, #60a5fa 100%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: absolute;
      top: -30%;
      left: -20%;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.12) 0%, transparent 60%);
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      bottom: -30%;
      right: -20%;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.08) 0%, transparent 60%);
      border-radius: 50%;
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 560px;
      text-align: center;
    }

    .logo {
      display: inline-flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 60px;
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--primary-light);
    }
    .logo-sub {
      font-size: 0.85rem;
      color: var(--text-tertiary);
      font-weight: 500;
      letter-spacing: 0;
    }

    .code {
      font-size: clamp(7rem, 22vw, 11rem);
      font-weight: 900;
      line-height: 1;
      background: var(--gradient-text);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.04em;
      margin-bottom: 24px;
      user-select: none;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 1.9rem);
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .desc {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .desc .em {
      color: var(--text-primary);
      font-weight: 600;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 10px 24px -8px rgba(37, 99, 235, 0.5);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--card-border);
    }
    .btn-ghost:hover {
      color: var(--text-primary);
      border-color: var(--text-secondary);
    }

    .hint {
      margin-top: 56px;
      padding-top: 24px;
      border-top: 1px solid var(--card-border);
      font-size: 0.85rem;
      color: var(--text-tertiary);
      line-height: 1.6;
    }

    @media (max-width: 480px) {
      .btn-group { flex-direction: column; align-items: stretch; }
      .btn { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <span>BBL</span>
      <span class="logo-sub">BioMotion · 베이스볼 바이오메카닉스 랩</span>
    </div>

    <div class="code">404</div>

    <h1>페이지를 찾을 수 없습니다</h1>

    <p class="desc">
      요청하신 페이지가 <span class="em">이동되었거나 더 이상 존재하지 않습니다</span>.<br>
      주소를 다시 확인해 주시거나, 아래 버튼으로 홈으로 이동해 주세요.
    </p>

    <div class="btn-group">
      <a href="/" class="btn btn-primary">
        홈으로 돌아가기
        <span>→</span>
      </a>
      <a href="/#contact" class="btn btn-ghost">문의하기</a>
    </div>

    <div class="hint">
      지속적으로 발생하는 문제라면 <strong style="color: var(--text-secondary)">happygh@kookmin.ac.kr</strong>로 알려주세요.
    </div>
  </div>
</body>
</html>
